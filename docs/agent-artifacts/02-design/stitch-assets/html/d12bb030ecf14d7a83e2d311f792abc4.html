<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Bé Ngoan - Quản lý nhiệm vụ</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&amp;family=Nunito+Sans:wght@400;600;700;800&amp;family=Public+Sans:wght@400;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#7C5CFC",
                        secondary: "#FF8FA3",
                        accent: "#FFC531",
                        background: "#FBF7FF",
                        success: "#3DD598",
                        error: "#FF5C5C",
                        locked: "#C7C2E0",
                        textPrimary: "#2D2A45",
                        textSecondary: "#8E8AA8",
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "2xl": "1.25rem",
                        "3xl": "1.5rem",
                        "card": "20px",
                        "full": "9999px"
                    },
                    fontFamily: {
                        headline: ["Comfortaa", "Public Sans", "sans-serif"],
                        display: ["Public Sans", "sans-serif"],
                        body: ["Nunito Sans", "sans-serif"],
                        label: ["Public Sans", "sans-serif"]
                    },
                    boxShadow: {
                        'soft': '0 6px 16px rgba(124, 92, 252, 0.12)',
                        'fab': '0 8px 24px rgba(124, 92, 252, 0.3)',
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Nunito Sans', sans-serif;
            background-color: #FBF7FF;
            -webkit-tap-highlight-color: transparent;
        }
        .font-headline { font-family: 'Comfortaa', cursive; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-chip {
            background-color: #7C5CFC;
            color: white;
        }
        .inactive-chip {
            background-color: rgba(124, 92, 252, 0.08);
            color: #8E8AA8;
        }
        .switch-checkbox:checked + .switch-label {
            background-color: #7C5CFC;
        }
        .switch-checkbox:checked + .switch-label .switch-dot {
            transform: translateX(1.25rem);
        }
        ::-webkit-scrollbar {
            display: none;
        }
        .bento-card {
            transition: transform 0.2s ease;
        }
        .bento-card:active {
            transform: scale(0.98);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-textPrimary pb-24">
<!-- Top App Bar -->
<header class="bg-[#FBF7FF] dark:bg-gray-900 flex justify-between items-center px-4 py-3 w-full sticky top-0 z-40">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full border-2 border-primary overflow-hidden">
<img class="w-full h-full object-cover" data-alt="A cute, circular avatar illustration of a young child with a bright smile, wearing a yellow star-patterned shirt. The artistic style is a soft, warm cartoon aesthetic with gentle pastel tones, reflecting the playful and friendly atmosphere of a gamified parenting app. High-quality digital art, clean lines, and a warm, inviting feel." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCWX7Ctxe9qKOBPcUAVCfQv7PsGtUyIcfnjiM8NbXqdp2x7YT_9zKzJbOoJ5kKwwAi544juenXcuKd34SEB67VuzqnEV8FeHFHwNXCcyQrh0PK9zmSzyorl-FC7a42le8E016I44SYcUvlM1bYfdQpXJmAegMTZPvaptEGevns28jDZldNP6X4V859xK8YULU2YBIDDt1SJ52ZDG5h23_1cEE91zn7iVTzVFrWYeZf9WcBqC8qg_dxFD2VtXAUUr5LdO90UbxlHKx8"/>

<h1 class="font-headline text-xl font-bold tracking-tight text-primary">Nhiệm vụ</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center text-primary hover:opacity-80 transition-opacity active:scale-95 duration-150">
<span class="material-symbols-outlined">notifications</span>
</button>
</header>
<main class="px-4 mt-2">
<!-- Filter Section -->
<div class="flex gap-2 overflow-x-auto py-2 no-scrollbar mb-4">
<button class="active-chip px-5 py-2 rounded-full font-bold text-sm transition-all whitespace-nowrap">Tất cả</button>
<button class="inactive-chip px-5 py-2 rounded-full font-semibold text-sm transition-all whitespace-nowrap hover:bg-primary/20">Đang hoạt động</button>
<button class="inactive-chip px-5 py-2 rounded-full font-semibold text-sm transition-all whitespace-nowrap hover:bg-primary/20">Tạm ẩn</button>
</div>
<!-- Task List -->
<div class="grid grid-cols-1 gap-4">
<!-- Task Card 1 -->

<div class="flex gap-2 items-center mt-1">
<span class="bg-accent/10 text-[#B88E00] px-2 py-1 rounded-full text-xs font-black">+30 ⭐</span>
<span class="bg-primary/5 text-primary px-2 py-1 rounded-full text-xs font-bold">Học tập</span>
</div>
</div>
<div class="relative inline-block w-10 align-middle select-none transition duration-200 ease-in">

<label class="switch-label block overflow-hidden h-5 rounded-full bg-locked cursor-pointer transition-colors duration-200 ease-in" for="toggle1">
<span class="switch-dot block w-5 h-5 rounded-full bg-white shadow-sm transform transition-transform duration-200"></span>
</label>
</div>
</div>
<div class="flex justify-between items-center pt-3 border-t border-gray-50">

<img class="w-full h-full object-cover" data-alt="A small, circular avatar of a cheerful young girl with two cute pigtails and a bright yellow shirt. The style is soft-shaded digital cartoon art with a focus on friendly, expressive features and warm lighting. It matches the playful, kid-friendly theme of the Bé Ngoan app." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCp2L8mw0NTx_yotEuIxRWMW6sVSIxfyTHV5t4mbE32ZS-MRz4rJW18f1UxG92SLA1hQf7p8Hs4b1REwLgJNYZWIQvtY9gNdQERE9CU17DzAkz6D44tZ0_mUZiFFiiU4jB-Peok_fM-i3YGvc0dvtJTf-ePqHHPp9jDSPOpC2WDmaA7e1yJxbCGkySPZO5n6L3PmWDR7jGZDVryrm94xfBC4eaqgGw5wreT5M8RzaFhP6h0ziDqjxe_YMLFpqoh4Vo9z1FK7pKyv0s"/>
</div>
<span class="text-xs font-bold text-textSecondary">Bé Bo</span>
</div>
<span class="material-symbols-outlined text-textSecondary text-lg">edit_note</span>
</div>
</div>
<!-- Task Card 2 -->
<div class="bg-white rounded-card p-4 shadow-soft bento-card border border-primary/5">
<div class="flex justify-between items-start mb-3">
<div class="flex flex-col gap-1">
<h3 class="font-bold text-lg leading-tight">Quét nhà giúp mẹ</h3>
<div class="flex gap-2 items-center mt-1">
<span class="bg-accent/10 text-[#B88E00] px-2 py-1 rounded-full text-xs font-black">+50 ⭐</span>
<span class="bg-secondary/10 text-secondary px-2 py-1 rounded-full text-xs font-bold">Việc nhà</span>
</div>
</div>
<div class="relative inline-block w-10 align-middle select-none transition duration-200 ease-in">
<input class="switch-checkbox absolute block w-5 h-5 rounded-full bg-white border-2 border-transparent appearance-none cursor-pointer z-10 transition-transform duration-200 ease-in translate-x-0" id="toggle2" name="toggle2" type="checkbox"/>
<label class="switch-label block overflow-hidden h-5 rounded-full bg-locked cursor-pointer transition-colors duration-200 ease-in" for="toggle2">
<span class="switch-dot block w-5 h-5 rounded-full bg-white shadow-sm transform transition-transform duration-200"></span>
</label>
</div>
</div>
<div class="flex justify-between items-center pt-3 border-t border-gray-50">
<div class="flex items-center gap-2">
<div class="w-8 h-8 rounded-full border border-primary/20 overflow-hidden">
<img class="w-full h-full object-cover" data-alt="A small circular icon of a happy little boy with messy brown hair and a striped blue shirt. Friendly, expressive cartoon style with bright eyes and a warm smile. Digital illustration optimized for a modern mobile interface, vibrant and high-contrast." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDNoher751nk4U7iujvYtlW6_gex6sypPXIo7BVy801pWjKMKV_8jrvSAqBjdW0QV_94w3n08hSXvIKQqBOWoB3UdQDDfcaUdqQhkNq5y7UKAC6F9m5UMKW1BnPkeiVSlyf-l9ogn79Arg-WY3gy2xaEfab24h1C64EJE2yNTYjxHozul9a3oFsFYqpFRwmV4dWtP_KjzrRiBgU8Pxei8_gjIcIhsj9QwVdCOAG2daCNEXvRMANDst_9gSjy0OFCp1ljcZAi4OL_Rw"/>
</div>
<span class="text-xs font-bold text-textSecondary">Cu Bi</span>
</div>
<span class="material-symbols-outlined text-textSecondary text-lg">edit_note</span>
</div>
</div>
<!-- Task Card 3 -->
<div class="bg-white rounded-card p-4 shadow-soft bento-card border border-primary/5">
<div class="flex justify-between items-start mb-3">
<div class="flex flex-col gap-1">
<h3 class="font-bold text-lg leading-tight">Ăn hết bát cơm</h3>
<div class="flex gap-2 items-center mt-1">
<span class="bg-accent/10 text-[#B88E00] px-2 py-1 rounded-full text-xs font-black">+20 ⭐</span>
<span class="bg-success/10 text-success px-2 py-1 rounded-full text-xs font-bold">Thói quen</span>
</div>
</div>
<div class="relative inline-block w-10 align-middle select-none transition duration-200 ease-in">
<input checked="" class="switch-checkbox absolute block w-5 h-5 rounded-full bg-white border-2 border-transparent appearance-none cursor-pointer z-10 transition-transform duration-200 ease-in translate-x-0" id="toggle3" name="toggle3" type="checkbox"/>
<label class="switch-label block overflow-hidden h-5 rounded-full bg-locked cursor-pointer transition-colors duration-200 ease-in" for="toggle3">
<span class="switch-dot block w-5 h-5 rounded-full bg-white shadow-sm transform transition-transform duration-200"></span>
</label>
</div>
</div>
<div class="flex justify-between items-center pt-3 border-t border-gray-50">
<div class="flex items-center gap-2">
<div class="w-8 h-8 rounded-full border border-primary/20 overflow-hidden">
<img class="w-full h-full object-cover" data-alt="Small circular avatar of a cute toddler girl with a pink bow in her dark curly hair. Hand-drawn digital illustration style with a warm, cheerful aesthetic and pastel colors. Perfectly suited for a family-oriented gamified mobile application." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBENd6-MxlNP1utPhtYmBXD9iAsckKzyew7XTU811kb29hQX97nk8sfgt1AXzDgdGSsdKjT5-InW3ELPrRbp-kv9Kj8oLnvhcajvbEBT3xSJWR-bEbgt1hcT3NcuyUg8pEwyeK0ZZ5XeNNugz0vB4HO09mrD3EVj0Pf5A8KOnwCk8j8UZ5iDuhmvjGdrrD0frHw_Auk3uG5A29XFzpjkvpKGmW3oq2bczaLDU3xgWa_PcmMVOvElll4tjmcECc75ahbK9xojVBIp3I"/>
</div>
<span class="text-xs font-bold text-textSecondary">Bé Mít</span>
</div>
<span class="material-symbols-outlined text-textSecondary text-lg">edit_note</span>
</div>
</div>
<!-- Decoration Element -->
<div class="mt-4 opacity-40 flex flex-col items-center justify-center p-6 grayscale">
<img class="w-48 h-auto mb-2 opacity-60" data-alt="A whimsical, illustrative scene of a small, adorable teddy bear sitting beside an empty bookshelf with some floating bubbles and stars. Soft, sketchy cartoon style with warm wood textures and gentle lighting. A peaceful and heartwarming background illustration for a children's app." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAQyswIOSbDf8ZjH-zO4UsjpHlNor6HmnVU4uoIxxBriVPrbwPg5iHxLhVeZvX036cyAnucwD9GUOb4A4qUtGL1WgLR2FJ6rL339JGXzTvoPegR5-XrgwEsHCIuiFaJPZtETJoLeWJqaBrZ0F1QvZgxiZW_k8Nf9SxR3_CprpXHEd-9f2Vfjhjlv2Oi0W8TFbL4tMoxKuQZ-hKcdJrcWcSNT7vBVFK4rkMDnkx7G69rKFY0a6wV1BHM4wuowOkYbwxyXh7BuETpy00"/>
<p class="text-xs font-semibold text-textSecondary text-center">Tạo thêm nhiệm vụ để nhận thêm sao nhé!</p>
</div>
</div>
</main>
<!-- FAB -->
<button class="fixed bottom-20 right-4 w-14 h-14 bg-primary text-white rounded-full flex items-center justify-center shadow-fab z-50 active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined text-3xl font-bold">add</span>
</button>
<!-- Bottom Nav Bar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-16 px-2 pb-safe bg-white dark:bg-gray-800 rounded-t-[24px] shadow-[0_-6px_16px_rgba(124,92,252,0.12)]">
<a class="flex flex-col items-center justify-center text-primary bg-primary/10 rounded-xl px-4 py-2 hover:text-secondary transition-colors active:scale-90 transition-transform duration-200" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">task_alt</span>
<span class="font-label text-xs font-semibold">Nhiệm vụ</span>
</a>
<a class="flex flex-col items-center justify-center text-[#8E8AA8] px-4 py-2 hover:text-secondary transition-colors active:scale-90 transition-transform duration-200" href="#">
<span class="material-symbols-outlined">redeem</span>
<span class="font-label text-xs font-semibold">Phần thưởng</span>
</a>
<a class="flex flex-col items-center justify-center text-[#8E8AA8] px-4 py-2 hover:text-secondary transition-colors active:scale-90 transition-transform duration-200" href="#">
<span class="material-symbols-outlined">insights</span>
<span class="font-label text-xs font-semibold">Theo dõi con</span>
</a>
</nav>
<script>
        // Simple ripple effect for buttons
        document.querySelectorAll('button, a').forEach(btn => {
            btn.addEventListener('click', function(e) {
                let ripple = document.createElement('span');
                ripple.classList.add('ripple');
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });
    </script>
</body></html>
