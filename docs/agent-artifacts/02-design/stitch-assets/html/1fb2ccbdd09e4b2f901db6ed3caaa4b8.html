<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Bé Ngoan - Đăng nhập</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600;700&amp;family=Nunito+Sans:wght@300;400;600;700&amp;family=Public+Sans:wght@400;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#7C5CFC",
                        secondary: "#FF8FA3",
                        accent: "#FFC531",
                        background: "#FBF7FF",
                        success: "#3DD598",
                        error: "#FF5C5C",
                        locked: "#C7C2E0",
                        textPrimary: "#2D2A45",
                        textSecondary: "#8E8AA8",
                        cardPink: "#FFF0F5",
                        cardPurple: "#F1EDFF"
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "2xl": "1.5rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        headline: ["Comfortaa", "Public Sans", "sans-serif"],
                        display: ["Comfortaa", "Public Sans", "sans-serif"],
                        body: ["Nunito Sans", "sans-serif"],
                        label: ["Public Sans", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Nunito Sans', sans-serif;
            background: linear-gradient(180deg, #7C5CFC 0%, #FF8FA3 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .bento-card {
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .bento-card:active {
            transform: scale(0.95);
        }
        .floating-stars {
            pointer-events: none;
            position: absolute;
            width: 100%;
            height: 100%;
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); opacity: 0.8; }
            50% { transform: translateY(-20px) rotate(10deg); opacity: 1; }
            100% { transform: translateY(0px) rotate(0deg); opacity: 0.8; }
        }
        .star-anim {
            animation: float 3s ease-in-out infinite;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-0 m-0">
<!-- Top Content Area -->
<main class="w-full max-w-[390px] flex flex-col items-center pt-8 pb-32 px-6 relative min-h-screen">
<!-- Animated Background Decor -->
<div class="absolute top-10 left-10 text-accent star-anim opacity-40">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
<div class="absolute top-40 right-10 text-accent star-anim opacity-40" style="animation-delay: 1.5s;">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
<!-- Illustration -->
<div class="w-full flex justify-center mb-6">
<div class="h-[200px] w-full flex items-center justify-center">
<img alt="Bé Ngoan App Illustration" class="h-full object-contain drop-shadow-xl" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBAjjVT9X3pCQFpH_zXvHu6II0VVHwCTxL4HOEZaFsmwWPM-KZCyKI3XTYosOGteglOdJTBs2o__6a1ORNOvOBYOxvCgglr03ISPUriszHjisHn8astFfRCh_oil4UQ0-v2rdRMKX09J-oCU3S4Vfe5oxHW0qaYGqrjAbEGHSe1jXlec7ExLacR49lKCajqEUMG8fWekpGHxalJL9CLz_U9lP9jkWKO8KEh44iMOTTIyTkU2_51xzkx4G_CT_9qm_W_TRvh4pC9tDI"/>
</div>
</div>
<!-- Branding -->
<div class="text-center mb-8">
<h1 class="text-[26px] font-bold text-white font-headline tracking-tight mb-1">Bé Ngoan</h1>
<p class="text-white/90 text-sm font-medium">Làm nhiệm vụ — Tích sao — Đổi quà!</p>
</div>
<!-- Role Selector Bento -->
<div class="w-full space-y-4 mb-8">
<!-- Card Con -->
<button class="bento-card w-full flex items-center p-4 bg-cardPink rounded-2xl shadow-[0_6px_16px_rgba(124,92,252,0.12)] border-2 border-white text-left group">
<div class="w-14 h-14 rounded-full bg-white flex items-center justify-center text-primary shadow-sm mr-4 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">face_6</span>
</div>
<div>
<h2 class="text-lg font-bold text-primary font-headline">Con vào chơi</h2>
<p class="text-textSecondary text-xs">Chọn nhiệm vụ và đổi quà</p>
</div>
<div class="ml-auto">
<span class="material-symbols-outlined text-primary/30">chevron_right</span>
</div>
</button>
<!-- Card Bố Mẹ -->
<button class="bento-card w-full flex items-center p-4 bg-cardPurple rounded-2xl shadow-[0_6px_16px_rgba(124,92,252,0.12)] border-2 border-white text-left group">
<div class="w-14 h-14 rounded-full bg-white flex items-center justify-center text-primary shadow-sm mr-4 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">family_history</span>
</div>
<div>
<h2 class="text-lg font-bold text-primary font-headline">Bố mẹ quản lý</h2>
<p class="text-textSecondary text-xs">Tạo nhiệm vụ và phần thưởng</p>
</div>
<div class="ml-auto">
<span class="material-symbols-outlined text-primary/30">chevron_right</span>
</div>
</button>
</div>
<!-- Login Bottom Sheet Style (Visual representation inside the canvas) -->
<div class="fixed bottom-0 w-full max-w-[390px] bg-white rounded-t-[32px] p-8 shadow-[0_-10px_40px_rgba(45,42,69,0.2)] z-10">
<div class="w-12 h-1 bg-locked rounded-full mx-auto mb-6"></div>
<form class="space-y-4">
<div class="space-y-1.5">
<label class="text-xs font-semibold text-textSecondary ml-2 uppercase tracking-wider">Tên đăng nhập / Số điện thoại</label>
<div class="relative">
<input class="w-full px-4 py-3.5 bg-background border-none rounded-2xl focus:ring-2 focus:ring-primary text-textPrimary placeholder:text-locked text-sm" placeholder="Nhập tên của bé hoặc bố mẹ" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-locked text-xl">person</span>
</div>
</div>
<div class="space-y-1.5">
<label class="text-xs font-semibold text-textSecondary ml-2 uppercase tracking-wider">Mật khẩu</label>
<div class="relative">
<input class="w-full px-4 py-3.5 bg-background border-none rounded-2xl focus:ring-2 focus:ring-primary text-textPrimary placeholder:text-locked text-sm" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-locked hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<div class="pt-2">
<button class="w-full h-[52px] bg-primary text-white font-bold rounded-2xl shadow-lg shadow-primary/30 active:scale-95 transition-all flex items-center justify-center font-headline" type="button">
                        Đăng nhập
                        <span class="material-symbols-outlined ml-2 text-xl">rocket_launch</span>
</button>
</div>
<div class="text-center pt-2">
<button class="text-xs text-textSecondary font-medium hover:text-primary" type="button">
                        Quên mật khẩu?
                    </button>
</div>
</form>
</div>
</main>
<!-- Floating Atmosphere Elements -->
<div class="fixed inset-0 pointer-events-none z-0">
<div class="absolute bottom-1/3 left-1/4 w-32 h-32 bg-white/10 blur-3xl rounded-full"></div>
<div class="absolute top-1/4 right-1/4 w-40 h-40 bg-white/10 blur-3xl rounded-full"></div>
</div>
<script>
        // Simple password toggle logic
        const toggleBtn = document.querySelector('button[type="button"] .material-symbols-outlined');
        const passInput = document.querySelector('input[type="password"]');
        
        if (toggleBtn && passInput) {
            toggleBtn.parentElement.addEventListener('click', () => {
                if (passInput.type === 'password') {
                    passInput.type = 'text';
                    toggleBtn.innerText = 'visibility_off';
                } else {
                    passInput.type = 'password';
                    toggleBtn.innerText = 'visibility';
                }
            });
        }
        
        // Add subtle interaction sounds or more animations if needed for the "game" feel
    </script>
</body></html>
