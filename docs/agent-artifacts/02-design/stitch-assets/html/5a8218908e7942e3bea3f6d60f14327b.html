<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cửa hàng phần thưởng - Lỗi</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&amp;family=Nunito+Sans:wght@400;600;700;800&amp;family=Public+Sans:wght@400;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#7C5CFC",
              secondary: "#FF8FA3",
              accent: "#FFC531",
              background: "#FBF7FF",
              "success-mint": "#3DD598",
              "error-coral": "#FF5C5C",
              "locked": "#C7C2E0",
              "text-primary": "#2D2A45",
              "secondary-text": "#8E8AA8",
              surface: "#FFFFFF"
            },
            borderRadius: {
              "DEFAULT": "0.5rem",
              "lg": "1rem",
              "xl": "1.5rem",
              "2xl": "20px",
              "3xl": "24px",
              "full": "9999px"
            },
            fontFamily: {
              headline: ["Public Sans", "sans-serif"],
              display: ["Comfortaa", "sans-serif"],
              body: ["Nunito Sans", "sans-serif"],
              label: ["Public Sans", "sans-serif"]
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #FBF7FF;
            font-family: 'Nunito Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .floating {
            animation: floating 3s ease-in-out infinite;
        }
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .pulse-soft {
            animation: pulse-soft 2s infinite;
        }
        @keyframes pulse-soft {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen text-text-primary">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface shadow-sm shadow-primary/10 flex items-center justify-between px-4 h-16 w-full fixed top-0 z-50 rounded-b-xl">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="stars">stars</span>
<h1 class="font-headline font-bold text-headline-sm text-primary">Cửa hàng quà tặng</h1>
</div>
<div class="bg-primary/10 px-3 py-1 rounded-full flex items-center gap-1 transition-colors active:scale-95 duration-200">
<span class="font-headline font-black text-primary text-sm">500 ⭐</span>
</div>
</header>
<!-- Main Content: Error State -->
<main class="flex-grow flex flex-col items-center justify-center px-6 pt-20 pb-24">
<div class="max-w-md w-full flex flex-col items-center text-center space-y-6">
<!-- Animated Error Illustration -->
<div class="relative w-64 h-64 flex items-center justify-center">
<div class="absolute inset-0 bg-primary/5 rounded-full pulse-soft"></div>
<div class="floating z-10">
<div class="relative">
<!-- Custom Error Character / Illustration Concept -->
<div class="w-48 h-48 bg-white rounded-3xl shadow-xl flex flex-col items-center justify-center border-4 border-primary/10">
<span class="material-symbols-outlined text-locked text-8xl mb-2" data-icon="sentiment_dissatisfied">sentiment_dissatisfied</span>
<div class="flex gap-2">
<span class="w-3 h-3 rounded-full bg-error-coral"></span>
<span class="w-3 h-3 rounded-full bg-error-coral"></span>
</div>
</div>
<!-- Sparkle Decorations -->
<span class="material-symbols-outlined absolute -top-4 -right-4 text-accent text-3xl opacity-40" data-icon="auto_awesome">auto_awesome</span>
<span class="material-symbols-outlined absolute -bottom-2 -left-6 text-primary text-4xl opacity-30" data-icon="cloud">cloud</span>
</div>
</div>
</div>
<!-- Error Messages -->
<div class="space-y-3">
<h2 class="text-3xl font-display font-bold text-text-primary tracking-tight">Ôi, có lỗi rồi!</h2>
<p class="text-secondary-text text-lg leading-relaxed px-4">
                    Không thể tải danh sách quà. <br/> Bé thử lại nhé!
                </p>
</div>
<!-- Action Button -->
<button class="w-full max-w-xs bg-primary text-white font-bold py-4 px-8 rounded-2xl shadow-lg shadow-primary/30 hover:brightness-110 active:scale-95 transition-all flex items-center justify-center gap-2 group" onclick="window.location.reload()">
<span class="material-symbols-outlined group-hover:rotate-180 transition-transform duration-500" data-icon="refresh">refresh</span>
                Thử lại
            </button>
<!-- Decorative Hint -->
<p class="text-locked text-sm font-medium">
                Kiểm tra mạng rồi nhấn nút ở trên nha
            </p>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 px-4 bg-white shadow-[0_-4px_12px_rgba(124,92,252,0.12)] rounded-t-3xl">
<!-- Tab: Nhiệm vụ -->
<a class="flex flex-col items-center justify-center text-secondary-text hover:text-primary transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined mb-1" data-icon="assignment">assignment</span>
<span class="font-label font-bold text-xs uppercase tracking-wider">Nhiệm vụ</span>
</a>
<!-- Tab: Phần thưởng (Active) -->
<a class="flex flex-col items-center justify-center bg-primary/10 text-primary rounded-full px-5 py-2 active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined mb-0.5" data-icon="redeem" style="font-variation-settings: 'FILL' 1;">redeem</span>
<span class="font-label font-bold text-xs uppercase tracking-wider">Phần thưởng</span>
</a>
<!-- Tab: Của con -->
<a class="flex flex-col items-center justify-center text-secondary-text hover:text-primary transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined mb-1" data-icon="face">face</span>
<span class="font-label font-bold text-xs uppercase tracking-wider">Của con</span>
</a>
</nav>
<!-- Subtle Background Sparkles (Atmospheric Interaction) -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const createSparkle = (e) => {
                const sparkle = document.createElement('div');
                sparkle.className = 'absolute pointer-events-none text-accent z-0 select-none';
                sparkle.innerHTML = '<span class="material-symbols-outlined" style="font-size: 14px">star</span>';
                sparkle.style.left = `${e.clientX}px`;
                sparkle.style.top = `${e.clientY}px`;
                document.body.appendChild(sparkle);

                const angle = Math.random() * Math.PI * 2;
                const dist = 20 + Math.random() * 30;
                const x = Math.cos(angle) * dist;
                const y = Math.sin(angle) * dist;

                sparkle.animate([
                    { transform: 'translate(0, 0) scale(0) rotate(0deg)', opacity: 1 },
                    { transform: `translate(${x}px, ${y}px) scale(1.5) rotate(180deg)`, opacity: 0 }
                ], {
                    duration: 800,
                    easing: 'cubic-bezier(0, .5, .5, 1)'
                }).onfinish = () => sparkle.remove();
            };

            document.addEventListener('click', createSparkle);
        });
    </script>
</body></html>
