        background-color: #FBF7FF;

        color: #2D2A45;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }
      .toggle-checkbox:checked + .toggle-label {
        background-color: #7C5CFC;
      }
      .toggle-checkbox:checked + .toggle-label .toggle-dot {

<div class="flex items-center justify-between">

                        500 <span class="text-[10px]">⭐</span>

<span class="text-[10px] text-text-secondary">Đã đổi: 6</span>

<span class="material-symbols-outlined active-pill" data-icon="redeem" style="font-variation-settings: 'FILL' 1;">redeem</span>
<span class="font-label font-bold text-[10px]">Phần thưởng</span>
</a>
<a class="flex flex-col items-center justify-center text-secondary-text hover:text-primary transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined" data-icon="face">face</span>
<span class="font-label font-bold text-[10px]">Của con</span>
</a>
</nav>
<!-- Micro-interaction Script -->
<script>
      // Add simple feedback when toggles are clicked
      document.querySelectorAll('.toggle-checkbox').forEach(toggle => {
        toggle.addEventListener('change', function() {
          const card = this.closest('.bg-white');
          if (!this.checked) {
            card.classList.add('opacity-60');
            card.style.filter = 'grayscale(0.5)';
          } else {
            card.classList.remove('opacity-60');
            card.style.filter = 'none';
          }
        });
      });
    </script>
</body></html>
