<script>
        function selectRole(role) {
            const cards = document.querySelectorAll('.role-card');
            cards.forEach(card => {
                card.classList.remove('active', 'border-primary', 'bg-[#F3F0FF]');
                const icon = card.querySelector('.material-symbols-outlined');
                const label = card.querySelector('.font-label');
                icon.classList.replace('text-primary', 'text-text-s');
                label.classList.replace('text-primary', 'text-text-s');
            });

            const selectedCard = event.currentTarget;
            selectedCard.classList.add('active', 'border-primary', 'bg-[#F3F0FF]');
            const icon = selectedCard.querySelector('.material-symbols-outlined');
            const label = selectedCard.querySelector('.font-label');
            icon.classList.replace('text-text-s', 'text-primary');
            label.classList.replace('text-text-s', 'text-primary');

            createSparkleBurst(selectedCard);
        }

        function createSparkleBurst(element) {
            const rect = element.getBoundingClientRect();
            for (let i = 0; i < 6; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                const size = Math.random() * 6 + 4;
                sparkle.style.width = `${size}px`;
                sparkle.style.height = `${size}px`;
                
                const startX = rect.left + rect.width / 2;
                const startY = rect.top + rect.height / 2;
                
                document.body.appendChild(sparkle);
                
                const angle = (Math.PI * 2 / 6) * i;
                const dist = 50 + Math.random() * 30;
                const destX = startX + Math.cos(angle) * dist;
                const destY = startY + Math.sin(angle) * dist;

                sparkle.style.left = `${startX}px`;
                sparkle.style.top = `${startY}px`;

                sparkle.animate([
                    { transform: 'translate(0, 0) scale(0)', opacity: 0 },
                    { transform: `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px) scale(1)`, opacity: 1, offset: 0.5 },
                    { transform: `translate(${Math.cos(angle) * (dist + 20)}px, ${Math.sin(angle) * (dist + 20)}px) scale(0)`, opacity: 0 }
                ], {
                    duration: 600,
                    easing: 'ease-out'
                }).onfinish = () => sparkle.remove();
            }
        }

        // Auto-select kid role on load for the visual
        document.addEventListener('DOMContentLoaded', () => {
            const kidBtn = document.querySelector('.role-card');
            if(kidBtn) selectRole('kid');
        });
    </script>
