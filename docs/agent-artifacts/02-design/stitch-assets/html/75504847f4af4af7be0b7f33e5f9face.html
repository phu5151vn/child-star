<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&amp;family=Nunito+Sans:wght@400;600;700;800&amp;family=Comfortaa:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        .dark .skeleton {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Nunito Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .font-headline { font-family: 'Public Sans', sans-serif; }
        .font-display { font-family: 'Public Sans', sans-serif; }
        .font-label { font-family: 'Public Sans', sans-serif; }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#7C5CFC",
                        secondary: "#FF8FA3",
                        accent: "#FFC531",
                        background: "#FBF7FF",
                        success: "#3DD598",
                        error: "#FF5C5C",
                        muted: "#8E8AA8",
                        "on-surface": "#2D2A45"
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "2xl": "2rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        headline: ["Public Sans", "sans-serif"],
                        display: ["Public Sans", "sans-serif"],
                        body: ["Nunito Sans", "sans-serif"],
                        label: ["Public Sans", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#FBF7FF] dark:bg-slate-900 text-[#2D2A45] min-h-screen pb-24">
<!-- TopAppBar -->
<header class="flex justify-between items-center px-4 py-2 w-full fixed top-0 bg-[#FBF7FF] dark:bg-slate-900 z-50">
<div class="flex items-center gap-2">
<div class="w-10 h-10 rounded-full skeleton"></div>
<div class="h-6 w-24 skeleton rounded-lg"></div>
</div>
<div class="flex items-center px-3 py-1.5 rounded-full bg-white dark:bg-slate-800 shadow-sm border border-[#7C5CFC]/10">
<div class="w-4 h-4 rounded-full skeleton mr-2"></div>
<div class="h-4 w-8 skeleton rounded-md"></div>
</div>
</header>
<main class="pt-16 px-4 space-y-6">
<!-- Profile Header Skeleton -->
<section class="flex flex-col items-center pt-6 pb-2">
<div class="relative">
<div class="w-28 h-28 rounded-full skeleton border-4 border-white shadow-lg"></div>
<div class="absolute bottom-0 right-0 w-8 h-8 rounded-full bg-white dark:bg-slate-800 flex items-center justify-center shadow-md">
<div class="w-4 h-4 rounded-full skeleton"></div>
</div>
</div>
<div class="mt-4 h-8 w-48 skeleton rounded-xl"></div>
<div class="mt-2 h-4 w-32 skeleton rounded-lg opacity-60"></div>
</section>
<!-- Stats Grid / Bento Layout -->
<div class="grid grid-cols-2 gap-4">
<!-- Points Card -->
<div class="bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-[0_6px_16px_rgba(124,92,252,0.12)] space-y-3">
<div class="flex justify-between items-start">
<div class="w-10 h-10 rounded-xl skeleton"></div>
<div class="w-12 h-4 skeleton rounded-lg"></div>
</div>
<div>
<div class="h-8 w-20 skeleton rounded-lg mb-1"></div>
<div class="h-4 w-24 skeleton rounded-lg opacity-40"></div>
</div>
</div>
<!-- Rank Card -->
<div class="bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-[0_6px_16px_rgba(124,92,252,0.12)] space-y-3">
<div class="flex justify-between items-start">
<div class="w-10 h-10 rounded-xl skeleton"></div>
<div class="w-12 h-4 skeleton rounded-lg"></div>
</div>
<div>
<div class="h-8 w-24 skeleton rounded-lg mb-1"></div>
<div class="h-4 w-16 skeleton rounded-lg opacity-40"></div>
</div>
</div>
</div>
<!-- History Section -->
<section class="space-y-4">
<div class="flex justify-between items-end px-1">
<div class="h-7 w-40 skeleton rounded-lg"></div>
<div class="h-4 w-20 skeleton rounded-md opacity-40"></div>
</div>
<div class="bg-white dark:bg-slate-800 rounded-2xl shadow-[0_6px_16px_rgba(124,92,252,0.12)] divide-y divide-gray-100 dark:divide-slate-700">
<!-- Skeleton Item 1 -->
<div class="p-4 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-12 h-12 rounded-xl skeleton"></div>
<div class="space-y-2">
<div class="h-5 w-32 skeleton rounded-md"></div>
<div class="h-3 w-20 skeleton rounded-md opacity-40"></div>
</div>
</div>
<div class="h-6 w-12 skeleton rounded-lg"></div>
</div>
<!-- Skeleton Item 2 -->
<div class="p-4 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-12 h-12 rounded-xl skeleton"></div>
<div class="space-y-2">
<div class="h-5 w-40 skeleton rounded-md"></div>
<div class="h-3 w-24 skeleton rounded-md opacity-40"></div>
</div>
</div>
<div class="h-6 w-12 skeleton rounded-lg"></div>
</div>
<!-- Skeleton Item 3 -->
<div class="p-4 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-12 h-12 rounded-xl skeleton"></div>
<div class="space-y-2">
<div class="h-5 w-28 skeleton rounded-md"></div>
<div class="h-3 w-16 skeleton rounded-md opacity-40"></div>
</div>
</div>
<div class="h-6 w-12 skeleton rounded-lg"></div>
</div>
<!-- Skeleton Item 4 -->
<div class="p-4 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-12 h-12 rounded-xl skeleton"></div>
<div class="space-y-2">
<div class="h-5 w-36 skeleton rounded-md"></div>
<div class="h-3 w-28 skeleton rounded-md opacity-40"></div>
</div>
</div>
<div class="h-6 w-12 skeleton rounded-lg"></div>
</div>
</div>
</section>
<!-- Achievements Preview -->
<section class="space-y-4">
<div class="h-7 w-48 skeleton rounded-lg px-1"></div>
<div class="flex gap-4 overflow-x-hidden pb-4">
<div class="flex-shrink-0 w-24 h-32 rounded-2xl skeleton"></div>
<div class="flex-shrink-0 w-24 h-32 rounded-2xl skeleton"></div>
<div class="flex-shrink-0 w-24 h-32 rounded-2xl skeleton"></div>
<div class="flex-shrink-0 w-24 h-32 rounded-2xl skeleton"></div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-2 py-3 bg-white dark:bg-slate-800 rounded-t-2xl shadow-[0_-6px_16px_rgba(124,92,252,0.12)]">
<div class="flex flex-col items-center justify-center text-[#8E8AA8] p-2">
<span class="material-symbols-outlined mb-1">task_alt</span>
<span class="font-label font-bold text-xs">Nhiệm vụ</span>
</div>
<div class="flex flex-col items-center justify-center text-[#8E8AA8] p-2">
<span class="material-symbols-outlined mb-1">redeem</span>
<span class="font-label font-bold text-xs">Phần thưởng</span>
</div>
<div class="flex flex-col items-center justify-center bg-[#7C5CFC] text-white rounded-xl px-4 py-2">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">face</span>
<span class="font-label font-bold text-xs">Của con</span>
</div>
</nav>
<script>
        // Micro-interaction simulation
        document.querySelectorAll('nav div').forEach(item => {
            item.addEventListener('click', () => {
                item.classList.add('scale-95');
                setTimeout(() => item.classList.remove('scale-95'), 100);
            });
        });
    </script>
</body></html>
