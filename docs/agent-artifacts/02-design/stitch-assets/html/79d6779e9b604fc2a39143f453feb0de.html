<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&amp;family=Public+Sans:wght@700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#7C5CFC",
                        secondary: "#FF8FA3",
                        accent: "#FFC531",
                        background: "#FBF7FF",
                        success: "#3DD598",
                        error: "#FF5C5C",
                        locked: "#C7C2E0",
                        textPrimary: "#2D2A45",
                        textSecondary: "#8E8AA8",
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "2xl": "2rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        headline: ["Public Sans", "sans-serif"],
                        display: ["Public Sans", "sans-serif"],
                        body: ["Nunito Sans", "sans-serif"],
                        label: ["Public Sans", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Nunito Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .floating-anim {
            animation: floating 3s ease-in-out infinite;
        }
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .sparkle-anim {
            animation: sparkle 2s infinite;
        }
        @keyframes sparkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#FBF7FF] text-[#2D2A45] min-h-screen flex flex-col overflow-hidden">
<!-- TopAppBar -->
<header class="bg-[#FBF7FF] dark:bg-gray-900 w-full top-0 flex justify-between items-center px-4 py-3 w-full z-10">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full border-2 border-[#7C5CFC] overflow-hidden bg-white shadow-sm">
<img class="w-full h-full object-cover" data-alt="A charming, hand-drawn illustration of a happy cartoon toddler child with sparkling eyes and a joyful smile, rendered in a soft watercolor and pencil texture. The character has round rosy cheeks and soft brown hair, wearing a tiny purple crown. The background is a clean white, emphasizing the playful, high-end game aesthetic of the app." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC8UV3BmnvAJPj5vSGhhFzYCwsWxdprnZywbusoT7hDT9Nj9NFrJY-kd80QvHdd4dtGLGuYfNq7EvUZ75lh8CmoXJ267Euh7n6EZ9BbYlFJi_74gGZ1nYj6HPM-tF4EPytAWMSf-C9MYVB3tL4s1duVx5l8UiaeY2HRcw28gVcwBu-Vt0b33WCEKpWi17oy8C9DyGo_R95B2iqaYlNFeF97I9ktsyMR4wX1vgwXKzZWbrVDYheY5FUHB4cTHeg_o17p_EHlb3eWgkw"/>
</div>
<h1 class="font-headline text-2xl font-black text-[#7C5CFC] tracking-tight">Bé Ngoan</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-xl bg-white shadow-[0_4px_12px_rgba(124,92,252,0.08)] text-[#7C5CFC] active:scale-95 duration-150">
<span class="material-symbols-outlined">notifications</span>
</button>
</header>
<!-- Main Content Canvas (Empty State S8a) -->
<main class="flex-1 flex flex-col items-center justify-center px-6 pb-24 text-center">
<!-- Illustration Container -->
<div class="relative w-full max-w-xs mb-8 floating-anim">
<!-- Decorative Elements -->
<div class="absolute -top-4 -left-4 sparkle-anim text-accent">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
<div class="absolute top-20 -right-2 sparkle-anim text-secondary delay-700">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
<!-- The Empty Shelf & Sad Bear Image -->
<div class="w-full aspect-square bg-contain bg-no-repeat bg-center" data-alt="A whimsical, storybook-style illustration of an empty wooden bookshelf with three tiers. At the base of the shelf sits a small, adorable brown teddy bear wearing a blue knitted scarf, looking downwards with large, sad, expressive eyes. The style is soft and painterly with warm wooden textures and gentle pastel tones of cream and brown. A small, friendly cartoon spider hangs from a tiny web in the corner of one shelf, adding to the empty but charming atmosphere." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCjyspwef4bnki3UGzxHS8wn8UI5Ini2HjZ4YEvoJUh1_YHZbC9aezh9Ls4AxMVkO75p9uJzv1Mcc2sBtbebcgVWbefz_3icqxRXj8fCJp8Khe2AqyY-JvL8cga9XI3O9gJx1klLU04qDNo7bXnCyFlaPP_KNNMYkQWAO03tr6Mt0GdyAqfa6n2EZSw58CuNyQXOHqc1RDVaLPO47nJiYYD8qFR4b7GWzfvqGohR_g8gsCJgnQNGxZ5OjWDY8b-zinuLb-HCiUsRfM')">
</div>
</div>
<!-- Text Content -->
<div class="space-y-3 max-w-[280px]">
<h2 class="font-headline text-2xl font-black text-[#2D2A45] leading-tight">
                Chưa có nhiệm vụ nào
            </h2>
<p class="text-[#8E8AA8] font-body text-base leading-relaxed">
                Bố mẹ hãy tạo nhiệm vụ đầu tiên để bé bắt đầu tích sao nhé!
            </p>
</div>
<!-- Primary Action Button -->
<button class="mt-10 group relative flex items-center gap-3 bg-[#7C5CFC] text-white px-8 py-4 rounded-full font-headline font-bold text-lg shadow-[0_8px_24px_rgba(124,92,252,0.3)] active:scale-95 transition-all duration-200 hover:bg-[#6849e6]">
<span class="material-symbols-outlined text-2xl">add_circle</span>
<span>Tạo nhiệm vụ đầu tiên</span>
<!-- Internal Glow/Reflection effect -->
<div class="absolute inset-0 rounded-full bg-gradient-to-t from-black/10 to-transparent pointer-events-none"></div>
</button>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-16 px-2 pb-safe bg-white dark:bg-gray-800 rounded-t-[24px] shadow-[0_-6px_16px_rgba(124,92,252,0.12)]">
<!-- Nhiệm vụ (Active) -->
<button class="flex flex-col items-center justify-center text-[#7C5CFC] bg-[#7C5CFC]/10 rounded-xl px-4 py-2 active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">task_alt</span>
<span class="font-label text-xs font-semibold mt-0.5">Nhiệm vụ</span>
</button>
<!-- Phần thưởng -->
<button class="flex flex-col items-center justify-center text-[#8E8AA8] px-4 py-2 hover:text-[#FF8FA3] transition-colors active:scale-90 duration-200">
<span class="material-symbols-outlined">redeem</span>
<span class="font-label text-xs font-semibold mt-0.5">Phần thưởng</span>
</button>
<!-- Theo dõi con -->
<button class="flex flex-col items-center justify-center text-[#8E8AA8] px-4 py-2 hover:text-[#FF8FA3] transition-colors active:scale-90 duration-200">
<span class="material-symbols-outlined">insights</span>
<span class="font-label text-xs font-semibold mt-0.5">Theo dõi con</span>
</button>
</nav>
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.querySelector('button.group');
            btn.addEventListener('touchstart', () => {
                btn.style.transform = 'scale(0.95)';
            });
            btn.addEventListener('touchend', () => {
                btn.style.transform = 'scale(1)';
            });
        });
    </script>
</body></html>
